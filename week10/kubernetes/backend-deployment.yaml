apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: python-app
        image: quinti04/python-gsx:v1
        ports:
        - containerPort: 8000
        env:
        - name: APP_PORT
          valueFrom:
            configMapKeyRef:
              name: gsx-config
              key: python_port
