name: CI – Build, Push & Validate

on:
  push:
    branches: [main]


jobs:
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag (short commit SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Nginx image ──────────────────────────────────────────────────────────
      - name: Build Nginx image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/nginx-gsx:${{ steps.tag.outputs.tag }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/nginx-gsx:latest \
            ./week9/nginx-server

      - name: Push Nginx image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nginx-gsx:${{ steps.tag.outputs.tag }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nginx-gsx:latest

      # ── Python app image ─────────────────────────────────────────────────────
      - name: Build Python app image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/python-gsx:${{ steps.tag.outputs.tag }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/python-gsx:latest \
            ./week9/python-app

      - name: Push Python app image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-gsx:${{ steps.tag.outputs.tag }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-gsx:latest

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: terraform fmt check
        working-directory: week11/terraform
        run: terraform fmt -check

      - name: terraform init (no backend)
        working-directory: week11/terraform
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: week11/terraform
        run: terraform validate
